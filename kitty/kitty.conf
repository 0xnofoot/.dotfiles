# config for kitty terminal

font_family             FiraMono Nerd Font Mono

# macos_thicken_font        0.1
font_size               16.0

# Nerd Fonts v3.3.0
symbol_map U+e000-U+e00a,U+ea60-U+ebeb,U+e0a0-U+e0c8,U+e0ca,U+e0cc-U+e0d7,U+e200-U+e2a9,U+e300-U+e3e3,U+e5fa-U+e6b7,U+e700-U+e8ef,U+ed00-U+efc1,U+f000-U+f2ff,U+f300-U+f381,U+f400-U+f533,U+f0001-U+f1af0 Symbols Nerd Font Mono


# color scheme with gruvbox dark
#
cursor                  #f8f8f2
cursor_text_color       #482a36

url_color               #83a598

visual_bell_color       #8ec07c
bell_border_color       #8ec07c

active_border_color     #d3869b
inactive_border_color   #665c54

foreground              #ebdbb2
background              #282828

selection_foreground    #928374
selection_background    #ebdbb2

active_tab_foreground   #fbf1c7
active_tab_background   #665c54
inactive_tab_foreground #a89984
inactive_tab_background #3c3836

# black  (bg3/bg4)
color0                  #000000
color8                  #4d4d4d

# red
color1                  #cc241d
color9                  #fb4934

#: green
color2                  #98971a
color10                 #b8bb26

# yellow
color3                  #d79921
color11                 #fabd2f

# blue
color4                  #458588
color12                 #83a598

# purple
color5                  #b16286
color13                 #d3869b

# aqua
color6                  #689d6a
color14                 #8ec07c

# white (fg4/fg3)
color7                  #a89984
color15                 #ebdbb2

mark1_foreground black
mark1_background #98d3cb
mark2_foreground black
mark2_background #f2dcd3
mark3_foreground black
mark3_background #f274bc

# hide the tab bar when only one tab
tab_bar_min_tabs 2
tab_bar_style hidden

# cursor config
shell_integration no-cursor

# allow remote (socket-only is safer than yes)
allow_remote_control socket-only
allow_passthrough yes

# enable option key as Alt(Meta) with kitty
macos_option_as_alt yes

# disable all default shortcuts to avoid conflicts with tmux/yazi
clear_all_shortcuts yes

# only keep essentials (macOS: cmd, Linux: ctrl)
map cmd+c        copy_to_clipboard
map cmd+v        paste_from_clipboard
map cmd+equal    change_font_size all +1.0
map cmd+minus    change_font_size all -1.0
map cmd+0        change_font_size all 0
map cmd+q        quit
map cmd+n        new_os_window

map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard
map ctrl+equal   change_font_size all +1.0
map ctrl+minus   change_font_size all -1.0
map ctrl+0       change_font_size all 0

# quality of life
confirm_os_window_close 0
enable_audio_bell       no
scrollback_lines        10000
cursor_trail            3
