"$schema" = "https://yazi-rs.github.io/schemas/theme.json"

# 使用社区 gruvbox-material 主题作为基础
[flavor]
dark = "gruvbox-material"

# 覆盖：标签页（渲染逻辑在 init.lua 中）
[tabs]
active   = { fg = "#282828", bg = "#d8a657", bold = true }
inactive = { fg = "#d4be98", bg = "#3c3836" }

# 覆盖：预览悬停使用背景高亮而非下划线
[indicator]
preview = { reversed = true }

# 覆盖：目录加粗
[filetype]
rules = [
	{ url = "*/", is = "link", fg = "#89b482", bold = true, italic = true },
	{ url = "*/", fg = "#7daea3", bold = true },
	{ mime = "image/*", fg = "#89b482" },
	{ mime = "{audio,video}/*", fg = "#d8a657" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", fg = "#d3869b" },
	{ mime = "application/{pdf,doc,rtf}", fg = "#a9b665" },
	{ mime = "vfs/{absent,stale}", fg = "#a89984" },
	{ url = "*", is = "orphan", fg = "#ea6962", bold = true },
	{ url = "*", is = "link", fg = "#89b482", italic = true },
	{ url = "*", is = "exec", fg = "#a9b665", bold = true },
	{ url = "*", is = "dummy", bg = "#ea6962" },
	{ url = "*/", is = "dummy", bg = "#ea6962" },
	{ url = "*", fg = "#d4be98" },
]

# 覆盖：which-key 弹窗提高对比度
[which]
cols            = 3
mask            = { bg = "#504945" }
cand            = { fg = "#7daea3", bold = true }
rest            = { fg = "#ddc7a1" }
desc            = { fg = "#d4be98" }
separator       = " → "
separator_style = { fg = "#928374" }
border          = { fg = "#7daea3" }
