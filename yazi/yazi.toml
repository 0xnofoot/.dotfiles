"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 3, 4 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "none"
show_hidden    = false
show_symlink   = true
scrolloff      = 6

[preview]
wrap            = "no"
tab_size        = 2
max_width       = 1920
max_height      = 1080
cache_dir       = ""
image_delay     = 30
image_filter    = "triangle"
image_quality   = 75

[opener]
edit = [
	{ run = "nvim %s",  desc = "nvim",  for = "unix", block = true },
	{ run = "vim %s",   desc = "vim",   for = "unix", block = true },
]
play = [
	{ run = "mpv -- %s",  desc = "mpv",  for = "unix" },
	{ run = "open %s",    desc = "Open", for = "macos" },
	{ run = "mediainfo %s1; echo 'Press enter to exit'; read _", block = true, desc = "Media info", for = "unix" },
]
open = [
	{ run = "open %s",  desc = "Open", for = "macos" },
]
reveal = [
	{ run = "open -R %s1",  desc = "Reveal in Finder", for = "macos" },
]
extract = [
	{ run = "ya pub extract --list %s", desc = "Extract here" },
]
image_view = [
	{ run = "open %s",           desc = "Open",      for = "macos" },
	{ run = "exiftool %s1; echo 'Press enter to exit'; read _", desc = "EXIF info", for = "unix", block = true },
]
pdf_view = [
	{ run = "open %s",  desc = "Open", for = "macos" },
]
libreoffice = [
	{ run = "open %s",  desc = "Open", for = "macos" },
]

[open]
rules = [
	# Folder
	{ url = "*/", use = [ "edit", "open", "reveal" ] },
	# Text
	{ mime = "text/*", use = [ "edit", "reveal" ] },
	# Image
	{ mime = "image/*", use = [ "image_view", "reveal" ] },
	# Media
	{ mime = "{audio,video}/*", use = [ "play", "reveal" ] },
	# Code / JSON
	{ mime = "application/{json,ndjson,javascript,wine-extension-ini}", use = [ "edit", "reveal" ] },
	# Archive
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", use = [ "extract", "reveal" ] },
	# PDF
	{ mime = "application/pdf", use = [ "pdf_view", "reveal" ] },
	# Office
	{ mime = "application/{msword,vnd.ms-excel,vnd.ms-powerpoint,vnd.openxmlformats*,vnd.oasis.opendocument*}", use = [ "libreoffice", "reveal" ] },
	# Empty file
	{ mime = "inode/empty", use = [ "edit", "reveal" ] },
	# Fallback
	{ url = "*", use = [ "open", "reveal" ] },
]

[tasks]
file_workers     = 3
plugin_workers   = 5
fetch_workers    = 5
preload_workers  = 2
process_workers  = 5
bizarre_retry    = 3
image_alloc      = 536870912
image_bound      = [ 10000, 10000 ]
suppress_preload = false

[plugin]
fetchers = [
	{ id = "mime", url = "*/",         run = "mime.dir", prio = "high" },
	{ id = "mime", url = "local://*",  run = "mime.local", prio = "high" },
	{ id = "mime", url = "remote://*", run = "mime.remote", prio = "high" },
]
spotters = [
	{ mime = "multi/*", run = "multi" },
	{ url = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "vfs/*", run = "vfs" },
	{ mime = "null/*", run = "null" },
	{ url = "*", run = "file" },
]
preloaders = [
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
]
previewers = [
	{ url = "*/", run = "folder" },
	{ mime = "text/*", run = "code" },
	{ mime = "application/{mbox,javascript,wine-extension-ini}", run = "code" },
	{ mime = "application/{json,ndjson}", run = "json" },
	{ mime = "image/{avif,hei?,jxl}", run = "magick" },
	{ mime = "image/svg+xml", run = "svg" },
	{ mime = "image/*", run = "image" },
	{ mime = "video/*", run = "video" },
	{ mime = "application/pdf", run = "pdf" },
	{ mime = "application/{zip,rar,7z*,tar,gzip,xz,zstd,bzip*,lzma,compress,archive,cpio,arj,xar,ms-cab*}", run = "archive" },
	{ mime = "application/{debian*-package,redhat-package-manager,rpm,android.package-archive}", run = "archive" },
	{ url = "*.{AppImage,appimage}", run = "archive" },
	{ mime = "application/{iso9660-image,qemu-disk,ms-wim,apple-diskimage}", run = "archive" },
	{ mime = "application/virtualbox-{vhd,vhdx}", run = "archive" },
	{ url = "*.{img,fat,ext,ext2,ext3,ext4,squashfs,ntfs,hfs,hfsx}", run = "archive" },
	{ mime = "font/*", run = "font" },
	{ mime = "application/ms-opentype", run = "font" },
	{ mime = "inode/empty", run = "empty" },
	{ mime = "vfs/*", run = "vfs" },
	{ mime = "null/*", run = "null" },
	{ url = "*", run = "file" },
]

[input]
cursor_blink = false

cd_title  = "Change directory:"
cd_origin = "bottom-center"
cd_offset = [ 0, -10, 50, 3 ]

create_title  = [ "Create:", "Create (dir):" ]
create_origin = "bottom-center"
create_offset = [ 0, -10, 50, 3 ]

rename_title  = "Rename:"
rename_origin = "hovered"
rename_offset = [ 0, 1, 50, 3 ]

filter_title  = "Filter:"
filter_origin = "bottom-center"
filter_offset = [ 0, -10, 50, 3 ]

find_title  = [ "Find next:", "Find previous:" ]
find_origin = "bottom-center"
find_offset = [ 0, -10, 50, 3 ]

search_title  = "Search via {n}:"
search_origin = "bottom-center"
search_offset = [ 0, -10, 50, 3 ]

shell_title  = [ "Shell:", "Shell (block):" ]
shell_origin = "bottom-center"
shell_offset = [ 0, -10, 50, 3 ]

[confirm]
trash_title  = "Trash {n} selected file{s}?"
trash_origin = "center"
trash_offset = [ 0, 0, 70, 20 ]

delete_title  = "Permanently delete {n} selected file{s}?"
delete_origin = "center"
delete_offset = [ 0, 0, 70, 20 ]

overwrite_title  = "Overwrite file?"
overwrite_body   = "Will overwrite the following file:"
overwrite_origin = "center"
overwrite_offset = [ 0, 0, 50, 15 ]

quit_title  = "Quit?"
quit_body   = "There are unfinished tasks, quit anyway?"
quit_origin = "center"
quit_offset = [ 0, 0, 50, 15 ]

[pick]
open_title  = "Open with:"
open_origin = "hovered"
open_offset = [ 0, 1, 50, 7 ]
