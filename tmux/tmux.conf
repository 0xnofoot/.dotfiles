#===============#
#===============#
set -g escape-time 0
set -sg repeat-time 300
set -s focus-events on
set -g mouse on
set -g allow-passthrough on
set -s exit-empty on
# Shift+Alt+<符号> 组合（M-_ / M-+ / M-) 等）在 kitty 下会以 CSI u 序列发送，
# 默认 tmux 识别不了会直接透给 shell。启用扩展键 + 对 xterm 系 TERM 声明 extkeys
# 能力，tmux 才能把它们解析成 M-<shifted>。
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

set -g set-clipboard on

set -g visual-activity off
set -g monitor-activity off
set -g monitor-bell off

set -g history-limit 50000

unbind C-b
set -g prefix 'C-s'
#===============#
#===============#

#===============#
#===============#
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours
#===============#
#===============#

#===============#
#===============#
set -g status-position bottom
set -g status-style "bg=colour234,fg=colour255"

# 设置窗口列表的样式
set -g window-status-style "bg=default,fg=colour245"
set -g window-status-current-style "bg=default,fg=colour208,bold"

# 设置状态栏左侧显示的内容
set -g status-left-length 30
set -g status-left "#[fg=colour250,bg=colour237,bold] #S #[fg=colour237,bg=colour235,nobold]"

# # 配置右侧状态栏
set -g status-right ""

# # 显示窗格编号（格式定义在下面 pane marking 区，含 marked 状态标记）
setw -g pane-border-status top

set -g pane-border-style "fg=colour110,bg=default"
set -g pane-active-border-style "fg=colour208,bg=default"

# 设置标题栏样式
set -g set-titles on
set -g set-titles-string "tmux #T"
#===============#
#===============#

#===============#
#===============#
unbind c
unbind n
unbind p
unbind x
unbind v
unbind l
unbind 1
unbind 2
unbind 3
unbind 4
unbind 5
unbind 6
unbind 7
unbind 8
unbind 9
unbind 0
#===============#
#===============#

#===============#
#===============#
set -g base-index 1

bind q confirm-before "kill-window"
bind Q kill-window

bind -n M-n new-window
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

bind h previous-window
bind l next-window
bind -n M-Tab last-window

bind -n M-! join-pane -t :1
bind -n M-@ join-pane -t :2
bind -n M-'#' join-pane -t :3
bind -n M-$ join-pane -t :4
bind -n M-% join-pane -t :5
bind -n M-^ join-pane -t :6
bind -n M-& join-pane -t :7
bind -n M-* join-pane -t :8
bind -n M-( join-pane -t :9
#===============#
#===============#

#===============#
#===============#
set -g pane-base-index 1

bind -n M-Q "kill-pane"
bind -n M-q confirm-before "kill-pane"

bind -n M-H split-window -hb -c "#{pane_current_path}"
bind -n M-J split-window -v -c "#{pane_current_path}"
bind -n M-K split-window -vb -c "#{pane_current_path}"
bind -n M-L split-window -h -c "#{pane_current_path}"

bind -n M-. swap-pane -D
bind -n M-, swap-pane -U
bind -n M-Space next-layout

bind -n M-N resize-pane -L 3
bind -n M-M resize-pane -D 3
bind -n M-< resize-pane -U 3
bind -n M-> resize-pane -R 3

bind -n M-';' resize-pane -Z

bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R
#===============#
#===============#

#===============#
#===============#
bind -n M-v copy-mode
set -g mode-keys vi

bind -T copy-mode-vi v send-keys -X begin-selection
bind -T copy-mode-vi C-v send-keys -X rectangle-toggle

bind -T copy-mode-vi H send-keys -N 5 -X cursor-left
bind -T copy-mode-vi J send-keys -N 5 -X cursor-down
bind -T copy-mode-vi K send-keys -N 5 -X cursor-up
bind -T copy-mode-vi L send-keys -N 5 -X cursor-right
bind -T copy-mode-vi W send-keys -N 3 -X next-word
bind -T copy-mode-vi E send-keys -N 3 -X next-word-end
bind -T copy-mode-vi B send-keys -N 3 -X previous-word
bind -T copy-mode-vi C-j send-keys -N 15 -X cursor-down
bind -T copy-mode-vi C-k send-keys -N 15 -X cursor-up

bind -T copy-mode-vi I send-keys -X start-of-line
bind -T copy-mode-vi A send-keys -X end-of-line
bind -T copy-mode-vi ',' send-keys -X start-of-line
bind -T copy-mode-vi '.' send-keys -X end-of-line
# 统一系统剪贴板命令（@clip_cmd 在下面所有 copy-pipe 里 #{}展开）
if-shell 'command -v pbcopy' \
  'set -g @clip_cmd "pbcopy"' \
  'set -g @clip_cmd "xclip -selection clipboard"'

# y 有选区→直接复制；无选区→进 yank 子表等下一个 motion 键
bind -T copy-mode-vi y if -F "#{selection_present}" \
  "send-keys -X copy-pipe '#{@clip_cmd}'" \
  "switch-client -T copy-mode-vi-yank"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe "#{@clip_cmd}"

# yank 子表：y<motion> 复制（类 vim operator+motion）
bind -T copy-mode-vi-yank y send-keys -X select-line \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank w send-keys -X begin-selection \; send-keys -X next-word-end \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank e send-keys -X begin-selection \; send-keys -X next-word-end \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank b send-keys -X begin-selection \; send-keys -X previous-word \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank '.' send-keys -X begin-selection \; send-keys -X end-of-line \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank ',' send-keys -X begin-selection \; send-keys -X start-of-line \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection

# yi<符号>：复制包围符号内部（类 vim text object yi"）
# 实现：jump-backward 找左界 + cursor-right 跨过 + begin-selection + jump-forward 找右界 + cursor-left 退一格 + copy
bind -T copy-mode-vi-yank i switch-client -T copy-mode-vi-yank-inside
bind -T copy-mode-vi-yank-inside '"' send-keys -X jump-backward '"' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward '"' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside "'" send-keys -X jump-backward "'" \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward "'" \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside '`' send-keys -X jump-backward '`' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward '`' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside '(' send-keys -X jump-backward '(' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward ')' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside ')' send-keys -X jump-backward '(' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward ')' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside '[' send-keys -X jump-backward '[' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward ']' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside ']' send-keys -X jump-backward '[' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward ']' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside '{' send-keys -X jump-backward '{' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward '}' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
bind -T copy-mode-vi-yank-inside '}' send-keys -X jump-backward '{' \; send-keys -X cursor-right \; send-keys -X begin-selection \; send-keys -X jump-forward '}' \; send-keys -X cursor-left \; send-keys -X copy-pipe "#{@clip_cmd}" \; send-keys -X clear-selection
#===============#
#===============#

#===============# pane marking #===============#
bind m select-pane -m
bind M select-pane -M
bind S swap-pane -s '{marked}'
bind J join-pane -s '{marked}'
# 在 pane 编号前加 * 显示当前 marked 状态
set -g pane-border-format "#{?pane_marked,* ,}#{pane_index}"
#===============#
#===============#

#===============# buffer stack #===============#
bind y choose-buffer -Z
