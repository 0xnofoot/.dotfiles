#===============#

#===============# TPM 插件列表 #===============#
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'schasse/tmux-jump'

# resurrect + continuum：continuum 每 15min 自动保存（prefix+Ctrl-s 手动保存仍可用）；
# 启动时**不**自动恢复，需 prefix+Ctrl-r 手动触发。pane 内容也进快照。
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-save-interval '15'

# floax：toggle 走自家 wrapper（floax-toggle.sh），只复用插件的 zoom-options.sh 做缩放
# 这里的 @floax-width/@floax-height/@floax-border-color/@floax-title 会被 wrapper
# 直接读取，其它 floax 原生选项（@floax-change-path、@floax-session-name 等）不再生效
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color 'magenta'
set -g @floax-title ' FloaX   M-f toggle   M-_ shrink   M-+ grow   M-) reset '

# jump：prefix+j 进入跳转模式，输单字符显示 hint 跳转
set -g @jump-key 'j'

# TPM init 必须放所有 @plugin 声明之后、且是最后一条 run
# 因 tmux.conf 在 XDG 路径（~/.config/tmux/），TPM 自动把插件装到
# ~/.config/tmux/plugins/，这里引用 XDG 下的 tpm
run '~/.config/tmux/plugins/tpm/tpm'

#===============# 插件键位重映射（必须在 tpm run 之后）#===============#
# floax.tmux 在 TPM 初始化时会把 prefix+p / prefix+P 绑到 floax.sh / menu.sh，
# 我们不用这两个键，解绑掉
unbind p
unbind P

# 显式打开 automatic-rename：已存在的 window 可能有 per-window 的状态锁，
# 用 setw -g 强制下发到所有现有 window，覆盖遗留的 off 状态。
# 手动 prefix+, 命名后 tmux 会自动关闭该 window 的 automatic-rename，不影响
setw -g automatic-rename on

# M-f：全局 toggle，走自家 wrapper
bind -n M-f run-shell '~/.config/tmux/scripts/floax-toggle.sh'

# M-_ / M-+ / M-) 只在 popup 内部（session_name == scratch）触发缩放/重置，
# 外部 pane 按这几个键就透传给 shell，不影响正常使用。依赖 extended-keys on
# 让 kitty 的 Alt+Shift+X 走 CSI u 序列被 tmux 识别为 M-<shifted>。
bind -n M-_ if-shell -F "#{==:#{session_name},scratch}" \
  "run-shell '~/.config/tmux/plugins/tmux-floax/scripts/zoom-options.sh in'" \
  "send-keys M-_"
bind -n M-+ if-shell -F "#{==:#{session_name},scratch}" \
  "run-shell '~/.config/tmux/plugins/tmux-floax/scripts/zoom-options.sh out'" \
  "send-keys M-+"
bind -n M-) if-shell -F "#{==:#{session_name},scratch}" \
  "run-shell '~/.config/tmux/plugins/tmux-floax/scripts/zoom-options.sh reset'" \
  "send-keys M-)"

# tpm：禁用所有快捷键，改走 CLI（命令见 .docs/USER.md）
unbind I
unbind U
unbind M-u
